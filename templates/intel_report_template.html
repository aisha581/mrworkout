<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #050505; color: #ffffff; padding: 40px; }
        .container { max-width: 650px; margin: 0 auto; background: #0f0f0f; border: 1px solid #333; border-radius: 24px; overflow: hidden; }
        .header { background: #000; padding: 40px; border-bottom: 2px solid #39ff14; text-align: center; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; color: #fff; }
        .content { padding: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 30px 0; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; text-align: center; }
        .card h4 { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 10px 0; }
        .card p { font-size: 28px; font-weight: 900; margin: 0; color: #39ff14; }
        .table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .table th { text-align: left; font-size: 10px; color: #444; text-transform: uppercase; padding-bottom: 15px; }
        .table td { padding: 12px 0; font-size: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        .footer { background: #000; padding: 25px; text-align: center; font-size: 10px; color: #444; letter-spacing: 3px; }
        .status-pill { background: rgba(57, 255, 20, 0.1); color: #39ff14; padding: 4px 12px; border-radius: 10px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Daily Intel Report</h1>
            <p style="font-size: 10px; color: #666; margin-top: 5px; letter-spacing: 2px;">{{date}} | PERIOD: 24H</p>
        </div>
        <div class="content">
            <p style="font-size: 14px; font-weight: bold; margin-bottom: 30px;">Scouting Mission Performance Summary:</p>
            
            <div class="grid">
                <div class="card">
                    <h4>Opens</h4>
                    <p>{{opens}}</p>
                </div>
                <div class="card">
                    <h4>Clicks</h4>
                    <p>{{clicks}}</p>
                </div>
                <div class="card">
                    <h4>Vector Ingests</h4>
                    <p>{{uploads}}</p>
                </div>
            </div>

            <h4 style="font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-top: 40px;">Recent Mission Activity</h4>
            <table class="table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Entity</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {{activity_rows}}
                </tbody>
            </table>
        </div>
        <div class="footer">
            CONFIDENTIAL SCUTTLING | MR. WORKOUT INTEL
        </div>
    </div>
</body>
</html>
