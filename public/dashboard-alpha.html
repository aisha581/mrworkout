<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Alpha | Mr. Workout</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-cyan: #00ffff;
            --dark-bg: #050505;
        }
        body {
            background: var(--dark-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; text-align: center; }
        .card h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 10px; }
        .card p { font-size: 32px; font-weight: 900; margin: 0; color: var(--neon-green); }
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.02); border-radius: 20px; overflow: hidden; }
        th { text-align: left; padding: 20px; font-size: 10px; text-transform: uppercase; color: #444; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .role-partner { color: #FFD700; font-weight: bold; }
        .role-athlete { color: var(--neon-cyan); }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 40px;">System Dashboard</h1>
        
        <div class="grid">
            <div class="card">
                <h3>Total Leads</h3>
                <p id="total-leads">0</p>
            </div>
            <div class="card">
                <h3>Partners</h3>
                <p id="partner-count" style="color: #FFD700;">0</p>
            </div>
            <div class="card">
                <h3>Athletes</h3>
                <p id="athlete-count" style="color: var(--neon-cyan);">0</p>
            </div>
        </div>

        <div class="test-panel" style="margin-bottom: 20px; display: flex; gap: 10px;">
            <button onclick="testConnection()" style="background: #333; color: #fff; border: 1px solid #444; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;">
                🔍 Test Google Connection (Direct Tab)
            </button>
            <button onclick="loadLeads()" style="background: var(--neon-green); color: #000; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;">
                🔄 Sync Now
            </button>
        </div>

        <table id="leads-table">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Email</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const STATS_URL = "/api/stats";

        function testConnection() {
            console.log("[STATS_PROXY] Verification link disabled for security. Use /api/stats.");
        }

        async function fetchData() {
            console.log("[DEBUG] Syncing directly with Google...");
            const loadingStatus = document.getElementById('total-leads');
            loadingStatus.innerText = "...";

            try {
                const sheetRes = await fetch(STATS_URL);
                const result = await sheetRes.json();
                console.log("[DEBUG] Live Data:", result);

                const rawData = result.waitlist || (Array.isArray(result) ? result : []);
                let data = [];
                let total = 0;

                if (rawData.length > 0 && Array.isArray(rawData[0])) {
                    data = rawData.slice(1).map(row => ({
                        timestamp: row[0],
                        email: row[1],
                        role: row[2] || 'athlete'
                    }));
                    total = Math.max(0, rawData.length - 1);
                } else {
                    data = rawData;
                    total = result.total || data.length;
                }

                document.getElementById('total-leads').innerText = total;
                document.getElementById('partner-count').innerText = data.filter(l => l.role?.toLowerCase() === 'partner').length;
                document.getElementById('athlete-count').innerText = data.filter(l => l.role?.toLowerCase() === 'athlete').length;

                const tbody = document.querySelector('#leads-table tbody');
                tbody.innerHTML = data.reverse().slice(0, 50).map(l => `
                    <tr>
                        <td style="color: #666; font-family: monospace;">${l.timestamp ? new Date(l.timestamp).toLocaleString() : 'N/A'}</td>
                        <td style="font-weight: bold;">${l.email || 'N/A'}</td>
                        <td class="role-${l.role?.toLowerCase() || 'athlete'}">${(l.role || 'ATHLETE').toUpperCase()}</td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error("[DEBUG] Sync Failed:", e);
                loadingStatus.innerText = "Error";
            }
        }

        loadLeads();
        setInterval(loadLeads, 30000);
    </script>
</body>
</html>
