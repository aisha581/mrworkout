<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waitlist Status | Mr. Workout</title>
    <style>
        body {
            background: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { padding: 40px; border: 1px solid #39ff14; border-radius: 30px; background: rgba(57, 255, 20, 0.02); box-shadow: 0 0 50px rgba(57, 255, 20, 0.05); }
        h1 { font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #39ff14; margin-bottom: 20px; }
        .status { font-size: 32px; font-weight: 900; margin-bottom: 20px; }
        .details { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>System Protocol</h1>
        <div class="status">WAITLIST: ONLINE</div>
        <div class="details">Batch 1 Processing | Status: Active</div>
        <div id="stats" style="margin-top: 30px; font-weight: bold; color: #fff;"></div>
    </div>
    <script>
        async function loadStats() {
            const res = await fetch('/leads.json');
            const data = await res.json();
            document.getElementById('stats').innerText = `${data.length} INITIATED`;
        }
        loadStats();
    </script>
</body>
</html>
