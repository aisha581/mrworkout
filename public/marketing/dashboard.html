<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR. WORKOUT | Outreach HUD</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; padding: 40px; }
        .hud-container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 40px; }
        .header h1 { letter-spacing: 5px; text-transform: uppercase; font-size: 24px; color: #00ffff; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #111; border: 1px solid #333; padding: 30px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 48px; font-weight: 900; margin: 10px 0; color: #39ff14; }
        .stat-label { text-transform: uppercase; font-size: 12px; color: #666; letter-spacing: 2px; }
        .campaign-hud { background: #111; border: 1px solid #333; padding: 30px; border-radius: 10px; }
        .campaign-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #222; }
        .campaign-name { font-weight: bold; color: #00ffff; }
        .live-indicator { width: 10px; height: 10px; background: #39ff14; border-radius: 50%; display: inline-block; margin-right: 10px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="hud-container">
        <div class="header">
            <h1><span class="live-indicator"></span>Outreach Tactical HUD</h1>
            <div id="last-update" style="color: #666; font-size: 12px;">Calibrating...</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Emails Sent</div>
                <div id="total-sent" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Open Rate</div>
                <div id="open-rate" class="stat-value" style="color: #00ffff;">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Click Rate</div>
                <div id="click-rate" class="stat-value" style="color: #f700ff;">0%</div>
            </div>
        </div>

        <div class="campaign-hud">
            <h3 style="margin-top: 0; text-transform: uppercase; letter-spacing: 2px;">Campaign Performance</h3>
            <div id="campaign-list">
                <!-- Campaigns will be injected here -->
            </div>
        </div>
    </div>

    <script>
        async function updateHUD() {
            try {
                const res = await fetch('/api/marketing/metrics');
                const data = await res.json();

                document.getElementById('total-sent').innerText = data.sent || 0;
                document.getElementById('open-rate').innerText = data.open_rate || '0.00%';
                document.getElementById('click-rate').innerText = data.click_rate || '0.00%';
                document.getElementById('last-update').innerText = 'Last Updated: ' + new Date().toLocaleTimeString();

                const list = document.getElementById('campaign-list');
                list.innerHTML = '';
                
                for (const [id, stats] of Object.entries(data.campaigns)) {
                    list.innerHTML += `
                        <div class="campaign-row">
                            <span class="campaign-name">${id.toUpperCase()}</span>
                            <span>Opens: ${stats.opens} | Clicks: ${stats.clicks}</span>
                        </div>
                    `;
                }
            } catch (e) {
                console.error('HUD Sync Failure', e);
            }
        }

        updateHUD();
        setInterval(updateHUD, 60000); // Update every minute
    </script>
</body>
</html>
