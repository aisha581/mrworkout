<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Portal | Mr. Workout</title>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-green: #39ff14;
            --dark-bg: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }

        .upload-card {
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 10px;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--neon-cyan);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--neon-green);
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(57, 255, 20, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(57, 255, 20, 0.4);
        }

        .btn-submit:disabled {
            background: #222;
            color: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .watermark {
            position: absolute;
            bottom: 40px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: rgba(255,255,255,0.1);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="upload-card">
        <div class="header">
            <h1>Coach Connection</h1>
            <p>Institutional Intake Protocol (v.2)</p>
        </div>

        <div style="text-align: center; margin-bottom: 30px;">
            <p style="font-size: 14px; text-transform: uppercase; color: #fff; letter-spacing: 1px; font-weight: 900;">
                Direct 3D Vector Audit
            </p>
            <p style="font-size: 11px; color: #888; margin-top: 10px; line-height: 1.6;">
                The intake portal is currently optimized for WhatsApp. 
                Click below to start your private biomechanical thread.
            </p>
        </div>

        <div class="form-group">
            <label>Coach Identifier</label>
            <input type="text" id="coach-name" placeholder="YOUR NAME / HANDLE">
        </div>

        <div class="form-group">
            <label>Athlete ID</label>
            <input type="text" id="athlete-id" placeholder="SUBJECT REF NO. (OPTIONAL)">
        </div>

        <button id="whatsapp-btn" class="btn-submit" style="background: #25D366; color: #fff; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.2);">
            Chat with Coach on WhatsApp
        </button>
    </div>

    <div class="watermark">MRWORKOUT.PRO</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://btmopyfbuvylmdfwqfuo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_q6qXYCW5pnFYLailU9fBMg_nNCwFT8h';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const whatsappBtn = document.getElementById('whatsapp-btn');
        const coachInput = document.getElementById('coach-name');
        const athleteInput = document.getElementById('athlete-id');

        whatsappBtn.addEventListener('click', async () => {
            const coachName = coachInput.value || 'Anonymous Lead';
            const athleteId = athleteInput.value || 'N/A';
            
            whatsappBtn.innerText = 'Initializing Secure Link...';
            whatsappBtn.disabled = true;

            try {
                // 1. Log Lead Click in Supabase
                const { error } = await supabase
                    .from('leads')
                    .insert([
                        { 
                            coach_name: coachName, 
                            athlete_id: athleteId,
                            contact_method: 'WHATSAPP',
                            status: 'CLICKED'
                        }
                    ]);

                if (error) console.error('Tracking Error:', error);

                // 2. Open WhatsApp Link
                const phone = "447341841844";
                const message = encodeURIComponent("Hey! I'm interested in joining the Mr. Workout Founder's Circle. Here's my clip for the 3D analysis.");
                const whatsappUrl = `https://wa.me/${phone}?text=${message}`;
                
                window.open(whatsappUrl, '_blank');
                
                whatsappBtn.innerText = 'Link Active';
                setTimeout(() => {
                    whatsappBtn.disabled = false;
                    whatsappBtn.innerText = 'Chat with Coach on WhatsApp';
                }, 3000);

            } catch (err) {
                console.error('Lead Error:', err);
                alert('Connection Error. Try again.');
                whatsappBtn.disabled = false;
                whatsappBtn.innerText = 'Chat with Coach on WhatsApp';
            }
        });
    </script>
</body>
</html>
