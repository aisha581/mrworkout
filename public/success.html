<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Secured | Mr. Workout</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-bg: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .success-box {
            max-width: 500px;
            padding: 40px;
        }

        .icon {
            font-size: 80px;
            color: var(--neon-green);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(57, 255, 20, 0.4));
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        p {
            font-size: 14px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-hub {
            display: inline-block;
            background: rgba(255,255,255,0.05);
            color: #fff;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .btn-hub:hover {
            background: rgba(255,255,255,0.1);
            border-color: #fff;
        }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="icon">✓</div>
        <h1>Movement Captured</h1>
        <p>Your athlete's biomechanical data has been successfully staged. Mr. Workout is now analyzing the vectors for Phase 2 calibration.</p>
        <a href="/sample_report.html" class="btn-hub">Return to Dashboard</a>
    </div>
</body>
</html>
