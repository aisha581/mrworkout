<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Biomechanical Report | Institutional Grade</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-cyan: #00ffff;
            --pulse-red: #ff3131;
            --dark-bg: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            display: flex;
        }

        .sidebar {
            width: 340px;
            height: calc(100vh - 40px);
            margin: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 20;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header {
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            color: #fff;
            border-left: 3px solid var(--neon-cyan);
            padding-left: 15px;
        }

        .metric-card {
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .metric-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--neon-cyan);
        }

        .metric-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .metric-value {
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: baseline;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .metric-unit {
            font-size: 14px;
            margin-left: 8px;
            color: var(--neon-cyan);
            font-weight: 400;
        }

        .action-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 18px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-audit {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.2);
        }

        .btn-audit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 255, 255, 0.4);
        }

        .btn-export {
            background: transparent;
            color: #fff;
            border: 1px solid var(--glass-border);
        }

        .btn-export:hover {
            background: rgba(255,255,255,0.05);
            border-color: #fff;
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
        }

        #watermark {
            position: absolute;
            bottom: 30px;
            right: 40px;
            opacity: 0.3;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            pointer-events: none;
            z-index: 10;
        }

        .leak-status {
            font-size: 11px;
            color: var(--pulse-red);
            font-weight: bold;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: pulse-op 1s infinite alternate;
        }

        @keyframes pulse-op {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        #recording-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--pulse-red);
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 30;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="header">Movement Bio</div>
        
        <div class="metric-card">
            <div class="metric-label">Knee Flexion Max</div>
            <div class="metric-value">142<span class="metric-unit">°</span></div>
            <div style="font-size: 10px; color: var(--neon-green); margin-top: 5px;">● OPTIMAL ALIGNMENT</div>
        </div>

        <div class="metric-card">
            <div class="metric-label">Force Impact</div>
            <div class="metric-value">2.4<span class="metric-unit">x BW</span></div>
            <div class="leak-status">⚠ HEEL STRIKE DETECTED</div>
        </div>

        <div class="metric-card">
            <div class="metric-label">Efficiency Rank</div>
            <div class="metric-value">94<span class="metric-unit">%</span></div>
        </div>

        <div class="action-container">
            <a href="https://mrworkout.pro/upload.html" class="btn btn-audit">Get Free Audit</a>
            <div id="export-trigger" class="btn btn-export">
                <span>Download for Instagram</span>
            </div>
        </div>
    </div>

    <div id="canvas-container">
        <div id="recording-overlay">● Recording Profile</div>
        <div id="watermark">mrworkout.pro</div>
    </div>

    <script>
        let scene, camera, renderer, masterGroup, recording = false;
        let skeletonGroup, bodyGroup;
        const bones = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 380) / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth - 380, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            masterGroup = new THREE.Group();
            scene.add(masterGroup);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));
            const rimLight = new THREE.DirectionalLight(0x00ffff, 0.5);
            rimLight.position.set(-5, 5, 5);
            scene.add(rimLight);
            
            const spotLight = new THREE.SpotLight(0xffffff, 1);
            spotLight.position.set(5, 10, 5);
            scene.add(spotLight);

            // Materials
            const boneMat = new THREE.MeshStandardMaterial({ 
                color: 0xffffff, 
                metalness: 1, 
                roughness: 0.1,
                emissive: 0xcccccc,
                emissiveIntensity: 0.2
            });
            
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: 0x111111, 
                transparent: true, 
                opacity: 0.6,
                roughness: 0
            });

            const leakMat = new THREE.MeshStandardMaterial({
                color: 0xff3131,
                emissive: 0xff3131,
                emissiveIntensity: 1
            });

            const optimalMat = new THREE.MeshStandardMaterial({
                color: 0x39ff14,
                emissive: 0x39ff14,
                emissiveIntensity: 1
            });

            // Build Silhouette Mannequin
            const buildPart = (geom, mat, y, parent) => {
                const mesh = new THREE.Mesh(geom, mat);
                mesh.position.y = y;
                parent.add(mesh);
                return mesh;
            };

            const torsoGeom = new THREE.CapsuleGeometry(0.5, 1.5, 4, 16);
            buildPart(torsoGeom, bodyMat, 2, masterGroup);

            // Bones
            const createBone = (h, x, y, z, mat) => {
                const geom = new THREE.CylinderGeometry(0.05, 0.05, h, 8);
                const mesh = new THREE.Mesh(geom, mat || boneMat);
                mesh.position.set(x, y, z);
                masterGroup.add(mesh);
                return mesh;
            };

            bones.push(createBone(1.5, 0.3, 0.5, 0)); // R Leg
            bones.push(createBone(1.5, -0.3, 0.5, 0)); // L Leg
            bones.push(createBone(1, 0.7, 2.5, 0, optimalMat)); // R Arm (Optimal)
            bones.push(createBone(1, -0.7, 2.5, 0)); // L Arm
            
            // Highlight leak (Heel/Ankle)
            const leakIndicator = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), leakMat);
            leakIndicator.position.set(0.3, -0.25, 0.5);
            masterGroup.add(leakIndicator);
            bones.push(leakIndicator);

            camera.position.z = 5;
            camera.position.y = 1.5;

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const t = Date.now() * 0.005;

            // Running simulation
            bones.forEach((b, i) => {
                if (i < 2) { // Legs
                    const off = i === 0 ? 0 : Math.PI;
                    b.rotation.x = Math.sin(t + off) * 0.6;
                } else if (i < 4) { // Arms
                    const off = i === 2 ? Math.PI : 0;
                    b.rotation.x = Math.sin(t + off) * 0.8;
                } else if (i === 4) { // Leak indicator
                    b.scale.setScalar(1 + Math.sin(t * 2) * 0.3);
                }
            });

            if (recording) {
                masterGroup.rotation.y += 0.063; // 10 sec spin logic (approx 2*PI / (10*60fps))
            } else {
                masterGroup.rotation.y += 0.01;
            }

            renderer.render(scene, camera);
        }

        // Export Engine
        document.getElementById('export-trigger').addEventListener('click', async () => {
            const btn = document.getElementById('export-trigger');
            const overlay = document.getElementById('recording-overlay');
            
            if (recording) return;
            
            recording = true;
            btn.style.opacity = '0.5';
            btn.innerText = 'Capturing...';
            overlay.style.display = 'flex';
            masterGroup.rotation.y = 0; // Reset for spin

            const stream = renderer.domElement.captureStream(60);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'MrWorkout_Biomechanical_Report.webm';
                a.click();
                
                recording = false;
                btn.style.opacity = '1';
                btn.innerText = 'Download for Instagram';
                overlay.style.display = 'none';
            };

            recorder.start();
            setTimeout(() => recorder.stop(), 10000); // 10 seconds
        });

        window.addEventListener('resize', () => {
            camera.aspect = (window.innerWidth - 380) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 380, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
